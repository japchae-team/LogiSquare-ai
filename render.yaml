services:
  - type: web
    name: logisquare-ai
    runtime: python
    plan: free
    buildCommand: bash build.sh
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: YOLO_MODEL_PATH
        value: models/ppe-helmet-vest-best.pt
      - key: YOLO_CONFIDENCE
        value: "0.25"
      - key: AI_SERVER_BASE_URL
        value: http://165.246.170.53:8000
      - key: BACKEND_CALLBACK_ENABLED
        value: "true"
      - key: BACKEND_BASE_URL
        value: https://logisquare.p-e.kr
      - key: BACKEND_REQUEST_TIMEOUT
        value: "15.0"
      - key: YOLO_CONFIG_DIR
        value: .runtime/ultralytics
      - key: MPLCONFIGDIR
        value: .runtime/matplotlib
      - key: MODEL_DOWNLOAD_URL
        sync: false
